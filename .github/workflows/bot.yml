name: Discord Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> .env
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> .env
          echo "GUILD_ID=${{ secrets.GUILD_ID }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY || 'ci-dummy' }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || secrets.GROQ_API_KEY || 'ci-dummy' }}" >> .env
          echo "AI_API_KEY=${{ secrets.AI_API_KEY || secrets.GROQ_API_KEY || 'ci-dummy' }}" >> .env
          echo "HORDE_API_KEY=${{ secrets.HORDE_API_KEY || '0000000000' }}" >> .env
          echo "HORDE_MODEL=${{ secrets.HORDE_MODEL }}" >> .env
          echo "TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}" >> .env
          echo "TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}" >> .env
          echo "HORDE_MAX_CONTEXT=2048" >> .env
          echo "HORDE_MAX_LENGTH=256" >> .env
          echo "KILO_ID=${{ secrets.KILO_ID }}" >> .env

      # Registers /wordle, /setup, and your other commands with Discord's API
      - name: Register Slash Commands
        run: node deploy-commands.js

      - name: Run Discord Bot
        run: node index.js
